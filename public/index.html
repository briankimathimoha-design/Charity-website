<script>
    // Grab all contribution buttons on the page
    document.querySelectorAll('.donate-btn').forEach(button => {
        button.addEventListener('click', async (e) => {
            // Find the description of the specific card clicked
            const card = e.target.closest('.charity-card');
            const itemTitle = card.querySelector('img').getAttribute('alt');
            
            button.innerText = "Processing...";
            button.disabled = true;

            try {
                // Send the click event to our Node.js server API
                const response = await fetch('/api/contribute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item: itemTitle })
                });

                const data = await response.json();
                
                if (data.success) {
                    alert(data.message); // This will show your server response message
                }
            } catch (error) {
                console.error("Error communicating with backend:", error);
                alert("Connection error. Please try again.");
            } finally {
                button.innerText = "Contribute Now";
                button.disabled = false;
            }
        });
    });
</script>
